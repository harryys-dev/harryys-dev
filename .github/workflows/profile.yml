name: Update Profile Card

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats and generate card
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Коммиты за неделю
          COMMITS=$(gh api graphql -f query='
          {
            viewer {
              contributionsCollection(from: "2026-03-28T00:00:00Z", to: "2026-04-04T00:00:00Z") {
                contributionCalendar { totalContributions }
              }
            }
          }' --jq '.data.viewer.contributionsCollection.contributionCalendar.totalContributions')

          # Самый активный репо
          REPO=$(gh api graphql -f query='
          {
            viewer {
              repositories(first: 1, orderBy: {field: PUSHED_AT, direction: DESC}, ownerAffiliations: OWNER) {
                nodes { nameWithOwner }
              }
            }
          }' --jq '.data.viewer.repositories.nodes[0].nameWithOwner')

          # Публичные репо
          REPOS=$(gh api 'users/harryys-dev' --jq '.public_repos')

          # Подписчики
          FOLLOWERS=$(gh api 'users/harryys-dev' --jq '.followers')

          # Топ языки
          LANGS=$(gh api 'users/ТВОЙ_НИК/repos?sort=stars&per_page=100' \
            --jq '[.[].language] | group_by(.) | sort_by(-length) | .[0:3] | map(.[0]) | join(", ")')

          # Заменяем плейсхолдеры в шаблоне
          sed -i \
            -e "s/{{COMMITS}}/$COMMITS/" \
            -e "s/{{REPO}}/$REPO/" \
            -e "s/{{REPOS}}/$REPOS/" \
            -e "s/{{FOLLOWERS}}/$FOLLOWERS/" \
            -e "s/{{LANGS}}/$LANGS/" \
            profile-template.svg

          cp profile-template.svg profile.svg

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add profile.svg
          git diff --cached --quiet || git commit -m "Update profile card [skip ci]"
          git push
