<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" viewBox="0 0 560 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="560" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Окно -->
  <rect width="560" height="320" rx="12" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect width="560" height="38" rx="12" fill="#313244"/>
  <rect y="26" width="560" height="12" fill="#313244"/>
  <circle cx="20" cy="19" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="19" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="19" r="6" fill="#a6e3a1"/>
  <text x="280" y="23" text-anchor="middle" fill="#6c7086" font-family="monospace" font-size="12">profile.json</text>

  <!-- JSON контент -->
  <text y="68" fill="#cdd6f4" font-family="'SF Mono','Fira Code',monospace" font-size="14">
    <tspan x="24" fill="#f38ba8">{</tspan>
    <tspan x="24" dy="26">  </tspan><tspan fill="#89b4fa">"name"</tspan><tspan fill="#6c7086">:</tspan><tspan fill="#a6e3a1"> "Твоё Имя"</tspan><tspan fill="#6c7086">,</tspan>
    <tspan x="24" dy="26">  </tspan><tspan fill="#89b4fa">"role"</tspan><tspan fill="#6c7086">:</tspan><tspan fill="#a6e3a1"> "Backend Developer"</tspan><tspan fill="#6c7086">,</tspan>
    <tspan x="24" dy="26">  </tspan><tspan fill="#89b4fa">"current_project"</tspan><tspan fill="#6c7086">:</tspan><tspan fill="#a6e3a1"> "{{REPO}}"</tspan><tspan fill="#6c7086">,</tspan>
    <tspan x="24" dy="26">  </tspan><tspan fill="#89b4fa">"this_week"</tspan><tspan fill="#6c7086">:</tspan><tspan fill="#cdd6f4"> {</tspan>
    <tspan x="44" dy="26">    </tspan><tspan fill="#89b4fa">"commits"</tspan><tspan fill="#6c7086">:</tspan><tspan fill="#fab387">{{COMMITS}}</tspan><tspan fill="#6c7086">,</tspan>
    <tspan x="44" dy="26">    </tspan><tspan fill="#89b4fa">"repos"</tspan><tspan fill="#6c7086">:</tspan><tspan fill="#fab387">{{REPOS}}</tspan><tspan fill="#6c7086">,</tspan>
    <tspan x="44" dy="26">    </tspan><tspan fill="#89b4fa">"followers"</tspan><tspan fill="#6c7086">:</tspan><tspan fill="#fab387">{{FOLLOWERS}}</tspan>
    <tspan x="24" dy="26">  </tspan><tspan fill="#cdd6f4">}</tspan><tspan fill="#6c7086">,</tspan>
    <tspan x="24" dy="26">  </tspan><tspan fill="#89b4fa">"languages"</tspan><tspan fill="#6c7086">:</tspan><tspan fill="#a6e3a1"> "{{LANGS}}"</tspan>
    <tspan x="24" dy="26" fill="#f38ba8">}</tspan>
  </text>
</svg>
